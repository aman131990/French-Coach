<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Coach 🇫🇷</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0e27;
    --blue: #1a237e;
    --gold: #f5c842;
    --red: #e63946;
    --white: #f8f5f0;
    --card: #12173a;
    --muted: #8892b0;
    --green: #43e97b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(245,200,66,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(245,200,66,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(245,200,66,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%, rgba(245,200,66,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(245,200,66,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    border-bottom: 1px solid rgba(245,200,66,0.15);
  }
  .flag { font-size: 2.2rem; margin-bottom: 0.3rem; display: block; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--gold), #fff 60%, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: var(--muted); font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 0.3rem; }
  .tabs { position: relative; z-index: 10; display: flex; justify-content: center; gap: 0.5rem; padding: 1.2rem 1rem; flex-wrap: wrap; }
  .tab-btn {
    background: var(--card);
    border: 1px solid rgba(245,200,66,0.2);
    color: var(--muted);
    padding: 0.6rem 1.2rem;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
  }
  .tab-btn.active, .tab-btn:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); font-weight: 700; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(245,200,66,0.3); }
  .section { display: none; position: relative; z-index: 10; padding: 1rem 1rem 3rem; max-width: 680px; margin: 0 auto; animation: fadeUp 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem; }
  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .vocab-card { background: var(--card); border: 1px solid rgba(245,200,66,0.1); border-radius: 16px; padding: 1.2rem 1.4rem; cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden; }
  .vocab-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold); border-radius: 4px 0 0 4px; opacity: 0; transition: opacity 0.2s; }
  .vocab-card:hover { border-color: rgba(245,200,66,0.4); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .vocab-card:hover::before { opacity: 1; }
  .vocab-card .french { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--gold); margin-bottom: 0.3rem; }
  .vocab-card .english { color: var(--muted); font-size: 0.9rem; }
  .vocab-card .category { position: absolute; top: 0.8rem; right: 0.8rem; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(245,200,66,0.4); font-weight: 500; }
  .speak-btn { margin-top: 0.8rem; background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.25); color: var(--gold); padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .speak-btn:hover { background: var(--gold); color: var(--navy); font-weight: 700; }
  .cat-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
  .cat-btn { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--muted); padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .cat-btn.active, .cat-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.08); }
  .phrase-list { display: flex; flex-direction: column; gap: 0.8rem; }
  .phrase-card { background: var(--card); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 1rem 1.2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; transition: all 0.2s; }
  .phrase-card:hover { border-color: rgba(245,200,66,0.3); transform: translateX(4px); }
  .phrase-text { flex: 1; }
  .phrase-text .fr { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--white); margin-bottom: 0.2rem; }
  .phrase-text .en { font-size: 0.82rem; color: var(--muted); }
  .phrase-text .romanized { font-size: 0.78rem; color: rgba(245,200,66,0.55); margin-top: 0.1rem; font-style: italic; }
  .icon-speak { width: 38px; height: 38px; background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; flex-shrink: 0; transition: all 0.2s; }
  .icon-speak:hover { background: var(--gold); transform: scale(1.1); }
  .quiz-wrap { background: var(--card); border: 1px solid rgba(245,200,66,0.15); border-radius: 20px; padding: 1.8rem; }
  .quiz-progress { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; margin: 0 1rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.4s ease; }
  .score-badge { background: rgba(245,200,66,0.15); border: 1px solid rgba(245,200,66,0.3); color: var(--gold); padding: 0.25rem 0.8rem; border-radius: 50px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
  .quiz-question { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 4vw, 1.8rem); text-align: center; margin: 1.5rem 0; color: var(--white); min-height: 60px; display: flex; align-items: center; justify-content: center; }
  .quiz-hint { text-align: center; color: var(--muted); font-size: 0.82rem; margin-bottom: 1.5rem; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1.5rem; }
  .option-btn { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1); color: var(--white); padding: 0.9rem 0.8rem; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; text-align: center; }
  .option-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(245,200,66,0.08); color: var(--gold); }
  .option-btn.correct { background: rgba(67,233,123,0.15); border-color: var(--green); color: var(--green); font-weight: 700; }
  .option-btn.wrong { background: rgba(230,57,70,0.15); border-color: var(--red); color: var(--red); }
  .option-btn:disabled { cursor: default; }
  .quiz-feedback { text-align: center; min-height: 28px; font-size: 1rem; font-weight: 600; margin-bottom: 0.8rem; transition: all 0.3s; }
  .quiz-nav { display: flex; justify-content: center; gap: 1rem; }
  .btn-next, .btn-restart { background: var(--gold); color: var(--navy); border: none; padding: 0.7rem 2rem; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; display: none; }
  .btn-next:hover, .btn-restart:hover { transform: scale(1.04); box-shadow: 0 4px 20px rgba(245,200,66,0.4); }
  .btn-next.show, .btn-restart.show { display: inline-block; }
  .result-screen { display: none; text-align: center; padding: 2rem 1rem; }
  .result-screen.show { display: block; animation: fadeUp 0.4s ease; }
  .result-emoji { font-size: 4rem; margin-bottom: 1rem; }
  .result-score { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 900; color: var(--gold); }
  .result-msg { color: var(--muted); margin: 0.5rem 0 2rem; font-size: 1rem; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(30px); background: var(--card); border: 1px solid rgba(245,200,66,0.4); color: var(--white); padding: 0.7rem 1.5rem; border-radius: 50px; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 480px) { .quiz-options { grid-template-columns: 1fr; } .vocab-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <span class="flag">🇫🇷</span>
  <h1>French Coach</h1>
  <p>Parlez-vous français?</p>
</header>
<nav class="tabs">
  <button class="tab-btn active" onclick="showTab('vocab',event)">📚 Vocabulary</button>
  <button class="tab-btn" onclick="showTab('conversation',event)">💬 Conversation</button>
  <button class="tab-btn" onclick="showTab('quiz',event)">🧩 Quiz</button>
</nav>
<section id="vocab" class="section active">
  <h2 class="section-title">📚 Vocabulary</h2>
  <div class="cat-filter" id="catFilter"></div>
  <div class="vocab-grid" id="vocabGrid"></div>
</section>
<section id="conversation" class="section">
  <h2 class="section-title">💬 Common Phrases</h2>
  <div class="phrase-list" id="phraseList"></div>
</section>
<section id="quiz" class="section">
  <h2 class="section-title">🧩 Quiz</h2>
  <div class="quiz-wrap" id="quizWrap">
    <div class="quiz-progress">
      <span style="font-size:0.8rem;color:var(--muted)" id="qNum">1 / 10</span>
      <div class="progress-bar"><div class="progress-fill" id="qProgress" style="width:0%"></div></div>
      <span class="score-badge" id="qScore">Score: 0</span>
    </div>
    <div class="quiz-question" id="qQuestion">Loading...</div>
    <div class="quiz-hint" id="qHint"></div>
    <div class="quiz-options" id="qOptions"></div>
    <div class="quiz-feedback" id="qFeedback"></div>
    <div class="quiz-nav">
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next →</button>
      <button class="btn-restart" id="btnRestart" onclick="restartQuiz()">🔄 Play Again</button>
    </div>
  </div>
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn-restart show" onclick="restartQuiz()">🔄 Play Again</button>
  </div>
</section>
<div class="toast" id="toast"></div>
<script>
const vocabData=[{fr:"Bonjour",en:"Hello / Good morning",cat:"Greetings"},{fr:"Bonsoir",en:"Good evening",cat:"Greetings"},{fr:"Au revoir",en:"Goodbye",cat:"Greetings"},{fr:"Merci",en:"Thank you",cat:"Greetings"},{fr:"S'il vous plaît",en:"Please",cat:"Greetings"},{fr:"Excusez-moi",en:"Excuse me",cat:"Greetings"},{fr:"De rien",en:"You're welcome",cat:"Greetings"},{fr:"Pardon",en:"Sorry",cat:"Greetings"},{fr:"Un",en:"One",cat:"Numbers"},{fr:"Deux",en:"Two",cat:"Numbers"},{fr:"Trois",en:"Three",cat:"Numbers"},{fr:"Quatre",en:"Four",cat:"Numbers"},{fr:"Cinq",en:"Five",cat:"Numbers"},{fr:"Six",en:"Six",cat:"Numbers"},{fr:"Sept",en:"Seven",cat:"Numbers"},{fr:"Huit",en:"Eight",cat:"Numbers"},{fr:"Neuf",en:"Nine",cat:"Numbers"},{fr:"Dix",en:"Ten",cat:"Numbers"},{fr:"Le pain",en:"Bread",cat:"Food"},{fr:"L'eau",en:"Water",cat:"Food"},{fr:"Le café",en:"Coffee",cat:"Food"},{fr:"Le vin",en:"Wine",cat:"Food"},{fr:"Le fromage",en:"Cheese",cat:"Food"},{fr:"Le repas",en:"Meal",cat:"Food"},{fr:"La pomme",en:"Apple",cat:"Food"},{fr:"Le poulet",en:"Chicken",cat:"Food"},{fr:"Rouge",en:"Red",cat:"Colors"},{fr:"Bleu",en:"Blue",cat:"Colors"},{fr:"Vert",en:"Green",cat:"Colors"},{fr:"Blanc",en:"White",cat:"Colors"},{fr:"Noir",en:"Black",cat:"Colors"},{fr:"Jaune",en:"Yellow",cat:"Colors"},{fr:"Rose",en:"Pink",cat:"Colors"},{fr:"Orange",en:"Orange",cat:"Colors"},{fr:"L'aéroport",en:"Airport",cat:"Travel"},{fr:"La gare",en:"Train station",cat:"Travel"},{fr:"L'hôtel",en:"Hotel",cat:"Travel"},{fr:"La rue",en:"Street",cat:"Travel"},{fr:"Le taxi",en:"Taxi",cat:"Travel"},{fr:"Le billet",en:"Ticket",cat:"Travel"},{fr:"La carte",en:"Map / Card",cat:"Travel"},{fr:"Où est...?",en:"Where is...?",cat:"Travel"}];
const phrases=[{fr:"Comment vous appelez-vous?",en:"What is your name?",rom:"Koh-mahn voo zah-play-voo?"},{fr:"Je m'appelle...",en:"My name is...",rom:"Zhuh mah-pel..."},{fr:"Comment allez-vous?",en:"How are you?",rom:"Koh-mahn tah-lay-voo?"},{fr:"Je vais bien, merci.",en:"I am fine, thank you.",rom:"Zhuh vay byahn, mehr-see."},{fr:"Je ne comprends pas.",en:"I don't understand.",rom:"Zhuh nuh kohm-prahn pah."},{fr:"Parlez-vous anglais?",en:"Do you speak English?",rom:"Par-lay-voo ahn-glay?"},{fr:"Où sont les toilettes?",en:"Where is the bathroom?",rom:"Oo sohn lay twah-let?"},{fr:"Combien ça coûte?",en:"How much does it cost?",rom:"Kohm-byahn sah koot?"},{fr:"Je voudrais commander.",en:"I would like to order.",rom:"Zhuh voo-dray koh-mahn-day."},{fr:"L'addition, s'il vous plaît.",en:"The bill, please.",rom:"Lah-dee-syohn, seel voo play."},{fr:"J'aime la France.",en:"I love France.",rom:"Zhhem lah Frohnss."},{fr:"Bonne nuit!",en:"Good night!",rom:"Bon nwee!"},{fr:"À bientôt!",en:"See you soon!",rom:"Ah byahn-toh!"},{fr:"Félicitations!",en:"Congratulations!",rom:"Fay-lee-see-tah-syohn!"},{fr:"Quel temps fait-il?",en:"What is the weather like?",rom:"Kel tohn fay-teel?"}];
function speak(t){if(!window.speechSynthesis){showToast("Voice not supported");return;}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=0.85;const v=window.speechSynthesis.getVoices();const fv=v.find(x=>x.lang.startsWith('fr'));if(fv)u.voice=fv;window.speechSynthesis.speak(u);showToast("🔊 "+t);}
if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();}
function showTab(id,e){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');if(e&&e.target)e.target.classList.add('active');if(id==='quiz'&&!quizStarted)initQuiz();}
const categories=['All',...new Set(vocabData.map(v=>v.cat))];
function buildVocab(){const cf=document.getElementById('catFilter');cf.innerHTML=categories.map(c=>`<button class="cat-btn ${c==='All'?'active':''}" onclick="filterCat('${c}',this)">${c}</button>`).join('');renderVocab('All');}
function filterCat(cat,btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderVocab(cat);}
function renderVocab(cat){const data=cat==='All'?vocabData:vocabData.filter(v=>v.cat===cat);document.getElementById('vocabGrid').innerHTML=data.map(v=>`<div class="vocab-card"><span class="category">${v.cat}</span><div class="french">${v.fr}</div><div class="english">${v.en}</div><button class="speak-btn" onclick="speak('${v.fr.replace(/'/g,"\\'")}')">🔊 Listen</button></div>`).join('');}
function buildPhrases(){document.getElementById('phraseList').innerHTML=phrases.map(p=>`<div class="phrase-card"><div class="phrase-text"><div class="fr">${p.fr}</div><div class="en">${p.en}</div><div class="romanized">${p.rom}</div></div><div class="icon-speak" onclick="speak('${p.fr.replace(/'/g,"\\'")}')">🔊</div></div>`).join('');}
let quizQuestions=[],quizIndex=0,quizScore=0,quizStarted=false,answered=false;
function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5);}
function initQuiz(){quizStarted=true;quizIndex=0;quizScore=0;answered=false;quizQuestions=shuffle(vocabData).slice(0,10).map(q=>{const wrong=shuffle(vocabData.filter(v=>v.fr!==q.fr)).slice(0,3).map(v=>v.en);const options=shuffle([q.en,...wrong]);return{question:q.fr,answer:q.en,options,hint:q.cat};});document.getElementById('resultScreen').classList.remove('show');document.getElementById('quizWrap').style.display='block';renderQuestion();}
function renderQuestion(){const q=quizQuestions[quizIndex];answered=false;document.getElementById('qNum').textContent=`${quizIndex+1} / ${quizQuestions.length}`;document.getElementById('qProgress').style.width=`${(quizIndex/quizQuestions.length)*100}%`;document.getElementById('qScore').textContent=`Score: ${quizScore}`;document.getElementById('qQuestion').textContent=q.question;document.getElementById('qHint').textContent=`Category: ${q.hint}`;document.getElementById('qFeedback').textContent='';document.getElementById('btnNext').classList.remove('show');document.getElementById('btnRestart').classList.remove('show');document.getElementById('qOptions').innerHTML=q.options.map(opt=>`<button class="option-btn" onclick="checkAnswer(this,'${opt.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}','${q.question.replace(/'/g,"\\'")}')">${opt}</button>`).join('');}
function checkAnswer(btn,chosen,correct,frWord){if(answered)return;answered=true;const allBtns=document.querySelectorAll('.option-btn');allBtns.forEach(b=>b.disabled=true);if(chosen===correct){btn.classList.add('correct');quizScore++;document.getElementById('qFeedback').innerHTML='✅ Correct! Très bien!';document.getElementById('qFeedback').style.color='var(--green)';speak(frWord);}else{btn.classList.add('wrong');allBtns.forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('correct');});document.getElementById('qFeedback').innerHTML=`❌ Answer: ${correct}`;document.getElementById('qFeedback').style.color='var(--red)';}document.getElementById('qScore').textContent=`Score: ${quizScore}`;if(quizIndex<quizQuestions.length-1){document.getElementById('btnNext').classList.add('show');}else{setTimeout(showResult,900);}}
function nextQuestion(){quizIndex++;renderQuestion();}
function showResult(){document.getElementById('quizWrap').style.display='none';const rs=document.getElementById('resultScreen');rs.classList.add('show');const pct=Math.round((quizScore/quizQuestions.length)*100);document.getElementById('resultScore').textContent=`${quizScore} / ${quizQuestions.length}`;let emoji,msg;if(pct===100){emoji='🏆';msg='Parfait! Perfect score!';}else if(pct>=70){emoji='🌟';msg='Très bien! Great job!';}else if(pct>=50){emoji='👍';msg='Pas mal! Keep practicing!';}else{emoji='📖';msg='Continue studying. You can do it!';}document.getElementById('resultEmoji').textContent=emoji;document.getElementById('resultMsg').textContent=msg;}
function restartQuiz(){document.getElementById('resultScreen').classList.remove('show');initQuiz();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
buildVocab();buildPhrases();
</script>
</body>
</html>
